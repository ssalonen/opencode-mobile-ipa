name: Check Upstream & Build

on:
  schedule:
    - cron: '0 0 * * 0'  # weekly (Sunday midnight UTC)
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if no upstream changes'
        required: false
        default: 'false'

  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  check-new-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      new_sha: ${{ steps.check.outputs.new_sha }}
      new_version: ${{ steps.check.outputs.new_version }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v6

      - name: Check upstream for latest commit
        id: check
        run: |
          upstream_url="https://github.com/Shahfarzane/opencode-mobile.git"
          new_sha=$(git ls-remote "$upstream_url" main | cut -f1)
          
          if [ -z "$new_sha" ]; then
            echo "No main branch found"
            exit 1
          fi
          
          echo "Upstream latest SHA: $new_sha"

          last_built=""
          if [ -f last-built.txt ]; then
            last_built=$(cat last-built.txt)
          fi
          
          echo "Last built: $last_built"
          
          if [ "${{ github.event.inputs.force_rebuild }}" == "true" ]; then
            echo "Force rebuild requested"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "new_sha=$new_sha" >> "$GITHUB_OUTPUT"
            echo "new_version=${new_sha:0:7}" >> "$GITHUB_OUTPUT"
          elif [ "$new_sha" != "$last_built" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "new_sha=$new_sha" >> "$GITHUB_OUTPUT"
            echo "new_version=${new_sha:0:7}" >> "$GITHUB_OUTPUT"
            echo "New version available: $new_sha"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "new_sha=" >> "$GITHUB_OUTPUT"
            echo "new_version=" >> "$GITHUB_OUTPUT"
            echo "No new version"
          fi

      - name: Save last built
        if: needs.check-new-version.outputs.should_build == 'true'
        run: |
          echo "${{ needs.check-new-version.outputs.new_sha }}" > last-built.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last-built.txt
          git commit -m "chore: update last-built for ${{ needs.check-new-version.outputs.new_version }}"
          git push

  build:
    needs: check-new-version
    if: needs.check-new-version.outputs.should_build == 'true'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        run: |
          # Read current version and increment
          python3 - <<'PYEOF'
          import json
          
          with open("altstore-source.json") as f:
              source = json.load(f)
          
          current = source["apps"][0].get("version", "1.0.0")
          parts = current.split(".")
          if len(parts) == 3:
              parts[-1] = str(int(parts[-1]) + 1)
          elif len(parts) == 2:
              parts.append("1")
          new_version = ".".join(parts)
          
          print(new_version)
          with open("new-version.txt", "w") as f:
              f.write(new_version)
          PYEOF
          
          NEW_VERSION=$(cat new-version.txt)
          SHA="${{ needs.check-new-version.outputs.new_sha }}"
          SHORT_SHA="${SHA:0:7}"
          TAG_NAME="v${NEW_VERSION}-${SHORT_SHA}"
          echo "TAG=$TAG_NAME" >> "$GITHUB_ENV"
          echo "VERSION_NUM=$NEW_VERSION" >> "$GITHUB_ENV"

      - name: Clone upstream repo
        run: |
          git clone --depth 1 --branch main \
            https://github.com/Shahfarzane/opencode-mobile.git \
            upstream-repo

      - name: Setup Node/Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          cd upstream-repo/packages/mobile
          bun install

      - name: Setup Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Run Expo prebuild
        run: |
          cd upstream-repo/packages/mobile
          npx expo prebuild --platform ios --clean

      - name: Build archive (unsigned for SideStore)
        run: |
          cd upstream-repo/packages/mobile/ios
          xcodebuild archive \
            -workspace OpenCode.xcworkspace \
            -scheme OpenCode \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/OpenCodeMobile.xcarchive" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            MARKETING_VERSION="${{ env.VERSION_NUM }}" \
            CURRENT_PROJECT_VERSION="${{ env.VERSION_NUM }}"

      - name: Package IPA
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/OpenCodeMobile.xcarchive" -name "OpenCode.app" | head -1)
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -r OpenCodeMobile.ipa Payload/
          echo "IPA_PATH=$RUNNER_TEMP/OpenCodeMobile.ipa" >> "$GITHUB_ENV"
          echo "IPA_SIZE=$(wc -c < OpenCodeMobile.ipa | tr -d ' ')" >> "$GITHUB_ENV"

      - name: Validate IPA structure
        run: |
          cd "$RUNNER_TEMP"
          echo "=== Validating IPA ==="
          
          if ! zip -T OpenCodeMobile.ipa > /dev/null 2>&1; then
            echo "ERROR: IPA is not a valid zip archive"
            exit 1
          fi
          echo "✓ Valid zip archive"
          
          echo "Listing IPA contents:"
          unzip -l OpenCodeMobile.ipa 2>&1 | head -50

          echo "Checking for Payload:"
          if unzip -l OpenCodeMobile.ipa 2>&1 | grep -q "Payload"; then
            echo "✓ Contains Payload directory"
          else
            echo "ERROR: IPA missing Payload directory"
            exit 1
          fi
          
          if unzip -l OpenCodeMobile.ipa 2>&1 | grep -qi "mobileprovision"; then
            echo "WARNING: IPA contains provisioning profile"
          fi
          
          echo "Extracting Info.plist:"
          unzip -p OpenCodeMobile.ipa Payload/OpenCode.app/Info.plist > /tmp/Info.plist 2>&1
          if [ ! -s /tmp/Info.plist ]; then
            echo "ERROR: Missing Info.plist in IPA"
            exit 1
          fi
          echo "✓ Info.plist exists ($(wc -c < /tmp/Info.plist) bytes)"
          echo "IPA validation passed"
          ls -lh OpenCodeMobile.ipa

      - name: Update altstore-source.json
        run: |
          export DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/OpenCodeMobile.ipa"
          export DATE="$(date -u +"%Y-%m-%dT%H:%M:%S+00:00")"

          python3 - <<'PYEOF'
          import json, os, urllib.request

          version_num  = os.environ["VERSION_NUM"]
          ipa_size     = int(os.environ["IPA_SIZE"])
          download_url = os.environ["DOWNLOAD_URL"]
          date         = os.environ["DATE"]

          with open("altstore-source.json") as f:
              source = json.load(f)

          app = source["apps"][0]

          new_entry = {
              "version": version_num,
              "date": date,
              "localizedDescription": "See GitHub release notes.",
              "downloadURL": download_url,
              "size": ipa_size,
              "minOSVersion": "15.1",
          }

          app["versions"] = [v for v in app.get("versions", []) if v["version"] != version_num]
          app["versions"].insert(0, new_entry)

          app["version"] = version_num
          app["versionDate"] = date
          app["versionDescription"] = "See GitHub release notes."
          app["downloadURL"] = download_url
          app["size"] = ipa_size

          with open("altstore-source.json", "w") as f:
              json.dump(source, f, indent=2)
              f.write("\n")

          with open("altstore-source.json") as f:
              json.load(f)
          print("AltStore source JSON is valid")

          try:
              response = urllib.request.urlopen(download_url, timeout=10)
              print(f"IPA URL accessible: {response.status}")
          except Exception as e:
              print(f"WARNING: Could not verify IPA URL: {e}")

          print(f"Updated source to {version_num} ({ipa_size} bytes)")
          PYEOF

      - name: Commit updated source JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add altstore-source.json
          if git diff --cached --quiet; then
            echo "No changes to altstore-source.json"
          else
            git commit -m "chore: update AltStore source for ${TAG}"
            git push origin HEAD:main
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          name: "OpenCode Mobile ${{ env.VERSION_NUM }}"
          body: |
            ## Install via SideStore / AltStore

            **Add this source URL in SideStore/AltStore:**
            ```
            https://raw.githubusercontent.com/${{ github.repository }}/main/altstore-source.json
            ```

            Or [download the IPA directly](https://github.com/${{ github.repository }}/releases/download/${{ env.TAG }}/OpenCodeMobile.ipa) and open it in SideStore/AltStore.

            ---
            *Unsigned build — SideStore/AltStore will sign it with your Apple ID on install.*
          files: ${{ env.IPA_PATH }}
          fail_on_unmatched_files: true